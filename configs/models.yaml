model_pool:
  - id: gpt
    enabled: true
    provider: openai
    model: gpt-5.4
    api_env_var: OPENAI_API_KEY
    count: 1
    generation:
      temperature: 0.7
      max_tokens: 400
      timeout_seconds: 60

  - id: gemini
    enabled: true
    provider: google
    model: gemini-2.5-pro
    api_env_var: GOOGLE_API_KEY
    count: 1
    generation:
      temperature: 0.7
      max_tokens: 400
      timeout_seconds: 60

  - id: claude
    enabled: true
    provider: anthropic
    model: claude-sonnet-4-5
    api_env_var: ANTHROPIC_API_KEY
    count: 1
    generation:
      temperature: 0.7
      max_tokens: 400
      timeout_seconds: 60

  - id: grok
    enabled: true
    provider: xai
    model: grok-4
    api_env_var: XAI_API_KEY
    count: 1
    generation:
      temperature: 0.7
      max_tokens: 400
      timeout_seconds: 60

assignment:
  mode: expand_by_count